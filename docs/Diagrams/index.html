0\" xmlns=\"http://www.w3.org/2000/svg\">\n  \u003cstyle>\n    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; fill: #111; }\n    .b { font-weight: 600; }\n    .dim { fill: #666; }\n    .box { fill: none; stroke: #111; stroke-width: 1; }\n    .fill { fill: #f0ede5; stroke: #111; stroke-width: 1; }\n    .dashed { stroke-dasharray: 4,4; fill: none; stroke: #111; stroke-width: 1; }\n    .flow { stroke: #111; stroke-width: 1; fill: none; }\n  \u003c/style>\n\u003cdefs>\n      \u003cmarker id=\"a1\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 z\" fill=\"#111\"/>\n      \u003c/marker>\n    \u003c/defs>\n    \u003crect class=\"box\" x=\"40\" y=\"20\" width=\"740\" height=\"110\"/>\n    \u003ctext x=\"55\" y=\"42\" class=\"b\">Application Code\u003c/text>\n    \u003crect class=\"fill\" x=\"80\" y=\"60\" width=\"660\" height=\"28\"/>\n    \u003ctext x=\"95\" y=\"80\" class=\"dim\">UoCharacter, UoCampaign, UoSession …\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"130\" x2=\"410\" y2=\"155\" marker-end=\"url(#a1)\"/>\n    \u003crect class=\"box\" x=\"40\" y=\"155\" width=\"740\" height=\"320\"/>\n    \u003ctext x=\"55\" y=\"177\" class=\"b\">STRVCT Framework\u003c/text>\n    \u003crect class=\"fill\" x=\"80\" y=\"200\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"95\" y=\"220\" class=\"b\">Domain Model\u003c/text>\n    \u003ctext x=\"95\" y=\"238\" class=\"dim\">SvNode tree\u003c/text>\n    \u003crect class=\"fill\" x=\"500\" y=\"200\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"515\" y=\"220\" class=\"b\">View Layer\u003c/text>\n    \u003ctext x=\"515\" y=\"238\" class=\"dim\">SvDomView, tiles\u003c/text>\n    \u003cline class=\"flow\" x1=\"320\" y1=\"235\" x2=\"500\" y2=\"235\" marker-end=\"url(#a1)\"/>\n    \u003cline class=\"flow\" x1=\"500\" y1=\"235\" x2=\"320\" y2=\"235\" marker-end=\"url(#a1)\"/>\n    \u003crect class=\"fill\" x=\"290\" y=\"300\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"320\" class=\"b\">Slot System\u003c/text>\n    \u003ctext x=\"305\" y=\"338\" class=\"dim\">shared metadata\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"370\" x2=\"410\" y2=\"390\"/>\n    \u003cline class=\"flow\" x1=\"120\" y1=\"390\" x2=\"700\" y2=\"390\"/>\n    \u003cline class=\"flow\" x1=\"120\" y1=\"390\" x2=\"120\" y2=\"410\" marker-end=\"url(#a1)\"/>\n    \u003cline class=\"flow\" x1=\"265\" y1=\"390\" x2=\"265\" y2=\"410\" marker-end=\"url(#a1)\"/>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"390\" x2=\"410\" y2=\"410\" marker-end=\"url(#a1)\"/>\n    \u003cline class=\"flow\" x1=\"555\" y1=\"390\" x2=\"555\" y2=\"410\" marker-end=\"url(#a1)\"/>\n    \u003cline class=\"flow\" x1=\"700\" y1=\"390\" x2=\"700\" y2=\"410\" marker-end=\"url(#a1)\"/>\n    \u003crect class=\"box\" x=\"55\"  y=\"410\" width=\"130\" height=\"50\"/>\n    \u003ctext x=\"120\" y=\"441\" text-anchor=\"middle\" class=\"b\">Persistence\u003c/text>\n    \u003crect class=\"box\" x=\"200\" y=\"410\" width=\"130\" height=\"50\"/>\n    \u003ctext x=\"265\" y=\"441\" text-anchor=\"middle\" class=\"b\">Sync\u003c/text>\n    \u003crect class=\"box\" x=\"345\" y=\"410\" width=\"130\" height=\"50\"/>\n    \u003ctext x=\"410\" y=\"441\" text-anchor=\"middle\" class=\"b\">AI Tools\u003c/text>\n    \u003crect class=\"box\" x=\"490\" y=\"410\" width=\"130\" height=\"50\"/>\n    \u003ctext x=\"555\" y=\"441\" text-anchor=\"middle\" class=\"b\">i18n\u003c/text>\n    \u003crect class=\"box\" x=\"635\" y=\"410\" width=\"130\" height=\"50\"/>\n    \u003ctext x=\"700\" y=\"441\" text-anchor=\"middle\" class=\"b\">Schema\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"475\" x2=\"410\" y2=\"490\"/>\n    \u003cline class=\"flow\" x1=\"220\" y1=\"490\" x2=\"600\" y2=\"490\"/>\n    \u003cline class=\"flow\" x1=\"220\" y1=\"490\" x2=\"220\" y2=\"510\" marker-end=\"url(#a1)\"/>\n    \u003cline class=\"flow\" x1=\"600\" y1=\"490\" x2=\"600\" y2=\"510\" marker-end=\"url(#a1)\"/>\n    \u003crect class=\"box\" x=\"40\" y=\"510\" width=\"360\" height=\"110\"/>\n    \u003ctext x=\"55\" y=\"532\" class=\"b\">Web Browser / Electron Platform\u003c/text>\n    \u003crect class=\"fill\" x=\"80\" y=\"550\" width=\"280\" height=\"28\"/>\n    \u003ctext x=\"95\" y=\"570\" class=\"dim\">IndexedDB · DOM · Fetch\u003c/text>\n    \u003crect class=\"box\" x=\"420\" y=\"510\" width=\"360\" height=\"110\"/>\n    \u003ctext x=\"435\" y=\"532\" class=\"b\">Node.js Headless Platform\u003c/text>\n    \u003crect class=\"fill\" x=\"460\" y=\"550\" width=\"280\" height=\"28\"/>\n    \u003ctext x=\"475\" y=\"570\" class=\"dim\">LevelDB · Browser API Shims\u003c/text>\n  \u003c/svg>\n"},"Annotations/_index.md":{"ok":true,"status":200,"content":"# Annotations\n\nOne slot declaration carries metadata that independent framework layers read without coordinating. Adding a new layer leaves existing layers unchanged.\n\n\u003csvg viewBox=\"0 0 820 480\" width=\"820\" xmlns=\"http://www.w3.org/2000/svg\">\n  \u003cstyle>\n    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; fill: #111; }\n    .b { font-weight: 600; }\n    .dim { fill: #666; }\n    .box { fill: none; stroke: #111; stroke-width: 1; }\n    .fill { fill: #f0ede5; stroke: #111; stroke-width: 1; }\n    .dashed { stroke-dasharray: 4,4; fill: none; stroke: #111; stroke-width: 1; }\n    .flow { stroke: #111; stroke-width: 1; fill: none; }\n  \u003c/style>\n\u003cdefs>\n      \u003cmarker id=\"a2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 z\" fill=\"#111\"/>\n      \u003c/marker>\n    \u003c/defs>\n    \u003crect class=\"fill\" x=\"250\" y=\"20\" width=\"320\" height=\"28\"/>\n    \u003ctext x=\"265\" y=\"40\" class=\"b\">a single slot declaration\u003c/text>\n    \u003ctext x=\"272\" y=\"78\">newSlot(\"name\", \"\")\u003c/text>\n    \u003ctext x=\"282\" y=\"100\">.setSlotType(\"String\")\u003c/text>\n    \u003ctext x=\"282\" y=\"122\">.setShouldStoreSlot(true)\u003c/text>\n    \u003ctext x=\"282\" y=\"144\">.setSyncsToView(true)\u003c/text>\n    \u003ctext x=\"282\" y=\"166\">.setCanEditInspection(true)\u003c/text>\n    \u003ctext x=\"282\" y=\"188\">.setIsSubnodeField(true)\u003c/text>\n    \u003ctext x=\"282\" y=\"210\">.setFinalInitProto(Cls)\u003c/text>\n    \u003ctext x=\"282\" y=\"232\">.setTranslationContext(...)\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"240\" x2=\"410\" y2=\"270\"/>\n    \u003cline class=\"flow\" x1=\"120\" y1=\"270\" x2=\"700\" y2=\"270\"/>\n    \u003cline class=\"flow\" x1=\"120\" y1=\"270\" x2=\"120\" y2=\"300\" marker-end=\"url(#a2)\"/>\n    \u003cline class=\"flow\" x1=\"270\" y1=\"270\" x2=\"270\" y2=\"300\" marker-end=\"url(#a2)\"/>\n    \u003cline class=\"flow\" x1=\"420\" y1=\"270\" x2=\"420\" y2=\"300\" marker-end=\"url(#a2)\"/>\n    \u003cline class=\"flow\" x1=\"570\" y1=\"270\" x2=\"570\" y2=\"300\" marker-end=\"url(#a2)\"/>\n    \u003cline class=\"flow\" x1=\"700\" y1=\"270\" x2=\"700\" y2=\"300\" marker-end=\"url(#a2)\"/>\n    \u003crect class=\"box\" x=\"55\"  y=\"300\" width=\"130\" height=\"70\"/>\n    \u003ctext x=\"120\" y=\"330\" text-anchor=\"middle\" class=\"b\">UI\u003c/text>\n    \u003ctext x=\"120\" y=\"352\" text-anchor=\"middle\" class=\"dim\">type, edit, nav\u003c/text>\n    \u003crect class=\"box\" x=\"205\" y=\"300\" width=\"130\" height=\"70\"/>\n    \u003ctext x=\"270\" y=\"330\" text-anchor=\"middle\" class=\"b\">Storage\u003c/text>\n    \u003ctext x=\"270\" y=\"352\" text-anchor=\"middle\" class=\"dim\">should-store\u003c/text>\n    \u003crect class=\"box\" x=\"355\" y=\"300\" width=\"130\" height=\"70\"/>\n    \u003ctext x=\"420\" y=\"330\" text-anchor=\"middle\" class=\"b\">Sync\u003c/text>\n    \u003ctext x=\"420\" y=\"352\" text-anchor=\"middle\" class=\"dim\">syncsToView\u003c/text>\n    \u003crect class=\"box\" x=\"505\" y=\"300\" width=\"130\" height=\"70\"/>\n    \u003ctext x=\"570\" y=\"330\" text-anchor=\"middle\" class=\"b\">AI / Patch\u003c/text>\n    \u003ctext x=\"570\" y=\"352\" text-anchor=\"middle\" class=\"dim\">type / schema\u003c/text>\n    \u003crect class=\"box\" x=\"635\" y=\"300\" width=\"130\" height=\"70\"/>\n    \u003ctext x=\"700\" y=\"330\" text-anchor=\"middle\" class=\"b\">i18n\u003c/text>\n    \u003ctext x=\"700\" y=\"352\" text-anchor=\"middle\" class=\"dim\">translation ctx\u003c/text>\n    \u003ctext x=\"410\" y=\"412\" text-anchor=\"middle\" class=\"dim\">No inter-layer coordination; each consumer reads only what it needs.\u003c/text>\n    \u003ctext x=\"410\" y=\"438\" text-anchor=\"middle\" class=\"dim\">A new layer added later: have it read the slot metadata it cares about.\u003c/text>\n  \u003c/svg>\n"},"Sync%20Flow/_index.md":{"ok":true,"status":200,"content":"# View ↔ Model ↔ Storage Syncing\n\nA user or agent mutation is validated by the setter, then broadcast through the notification center. View and storage layers schedule their work end-of-event-loop.\n\n\u003csvg viewBox=\"0 0 820 620\" width=\"820\" xmlns=\"http://www.w3.org/2000/svg\">\n  \u003cstyle>\n    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; fill: #111; }\n    .b { font-weight: 600; }\n    .dim { fill: #666; }\n    .box { fill: none; stroke: #111; stroke-width: 1; }\n    .fill { fill: #f0ede5; stroke: #111; stroke-width: 1; }\n    .dashed { stroke-dasharray: 4,4; fill: none; stroke: #111; stroke-width: 1; }\n    .flow { stroke: #111; stroke-width: 1; fill: none; }\n  \u003c/style>\n\u003cdefs>\n      \u003cmarker id=\"a3\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 z\" fill=\"#111\"/>\n      \u003c/marker>\n    \u003c/defs>\n    \u003crect class=\"box\" x=\"290\" y=\"20\" width=\"240\" height=\"50\"/>\n    \u003ctext x=\"410\" y=\"51\" text-anchor=\"middle\" class=\"b\">user input\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"70\" x2=\"410\" y2=\"95\" marker-end=\"url(#a3)\"/>\n    \u003crect class=\"fill\" x=\"290\" y=\"95\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"115\" class=\"b\">SvDomView\u003c/text>\n    \u003ctext x=\"305\" y=\"133\" class=\"dim\">handles event, calls action\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"165\" x2=\"410\" y2=\"190\" marker-end=\"url(#a3)\"/>\n    \u003crect class=\"fill\" x=\"290\" y=\"190\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"210\" class=\"b\">SvNode setter\u003c/text>\n    \u003ctext x=\"305\" y=\"228\" class=\"dim\">validates against slotType\u003c/text>\n    \u003cline class=\"flow\" x1=\"530\" y1=\"225\" x2=\"630\" y2=\"225\" marker-end=\"url(#a3)\"/>\n    \u003ctext x=\"580\" y=\"218\" text-anchor=\"middle\" class=\"dim\">reject\u003c/text>\n    \u003crect class=\"box\" x=\"630\" y=\"190\" width=\"160\" height=\"70\"/>\n    \u003ctext x=\"710\" y=\"220\" text-anchor=\"middle\" class=\"b\">rejection\u003c/text>\n    \u003ctext x=\"710\" y=\"242\" text-anchor=\"middle\" class=\"dim\">with slot schema\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"260\" x2=\"410\" y2=\"285\" marker-end=\"url(#a3)\"/>\n    \u003ctext x=\"425\" y=\"277\" class=\"dim\">didUpdateSlot\u003c/text>\n    \u003crect class=\"fill\" x=\"290\" y=\"285\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"305\" class=\"b\">SvNotificationCenter\u003c/text>\n    \u003ctext x=\"305\" y=\"323\" class=\"dim\">post to observers\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"355\" x2=\"410\" y2=\"380\"/>\n    \u003cline class=\"flow\" x1=\"180\" y1=\"380\" x2=\"640\" y2=\"380\"/>\n    \u003cline class=\"flow\" x1=\"180\" y1=\"380\" x2=\"180\" y2=\"400\" marker-end=\"url(#a3)\"/>\n    \u003cline class=\"flow\" x1=\"640\" y1=\"380\" x2=\"640\" y2=\"400\" marker-end=\"url(#a3)\"/>\n    \u003crect class=\"fill\" x=\"60\" y=\"400\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"75\" y=\"420\" class=\"b\">observing views\u003c/text>\n    \u003ctext x=\"75\" y=\"438\" class=\"dim\">scheduleSyncToView\u003c/text>\n    \u003crect class=\"fill\" x=\"520\" y=\"400\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"535\" y=\"420\" class=\"b\">persistence hook\u003c/text>\n    \u003ctext x=\"535\" y=\"438\" class=\"dim\">addDirtyObject(self)\u003c/text>\n    \u003cline class=\"flow\" x1=\"180\" y1=\"470\" x2=\"180\" y2=\"495\" marker-end=\"url(#a3)\"/>\n    \u003cline class=\"flow\" x1=\"640\" y1=\"470\" x2=\"640\" y2=\"495\" marker-end=\"url(#a3)\"/>\n    \u003crect class=\"box\" x=\"60\" y=\"495\" width=\"240\" height=\"50\"/>\n    \u003ctext x=\"180\" y=\"526\" text-anchor=\"middle\" class=\"b\">view re-renders\u003c/text>\n    \u003crect class=\"box\" x=\"520\" y=\"495\" width=\"240\" height=\"50\"/>\n    \u003ctext x=\"640\" y=\"526\" text-anchor=\"middle\" class=\"b\">IndexedDB commit\u003c/text>\n    \u003ctext x=\"410\" y=\"585\" text-anchor=\"middle\" class=\"dim\">Coalesced once per event loop. Bidirectional sync stops when values converge.\u003c/text>\n  \u003c/svg>\n"},"View%20Resolution/_index.md":{"ok":true,"status":200,"content":"# View Resolution\n\nWhen a node becomes visible, the framework finds a view class by climbing the node's inheritance chain. Custom views are an override; the default is always available.\n\n\u003csvg viewBox=\"0 0 820 540\" width=\"820\" xmlns=\"http://www.w3.org/2000/svg\">\n  \u003cstyle>\n    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; fill: #111; }\n    .b { font-weight: 600; }\n    .dim { fill: #666; }\n    .box { fill: none; stroke: #111; stroke-width: 1; }\n    .fill { fill: #f0ede5; stroke: #111; stroke-width: 1; }\n    .dashed { stroke-dasharray: 4,4; fill: none; stroke: #111; stroke-width: 1; }\n    .flow { stroke: #111; stroke-width: 1; fill: none; }\n  \u003c/style>\n\u003cdefs>\n      \u003cmarker id=\"a4\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 z\" fill=\"#111\"/>\n      \u003c/marker>\n    \u003c/defs>\n    \u003crect class=\"fill\" x=\"290\" y=\"20\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"40\" class=\"b\">navigate to node N\u003c/text>\n    \u003ctext x=\"305\" y=\"58\" class=\"dim\">instance of class C\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"90\" x2=\"410\" y2=\"135\" marker-end=\"url(#a4)\"/>\n    \u003crect class=\"fill\" x=\"290\" y=\"135\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"155\" class=\"b\">C declares nodeViewClass()?\u003c/text>\n    \u003ctext x=\"305\" y=\"173\" class=\"dim\">decision\u003c/text>\n    \u003cline class=\"flow\" x1=\"290\" y1=\"170\" x2=\"200\" y2=\"170\" marker-end=\"url(#a4)\"/>\n    \u003ctext x=\"245\" y=\"162\" text-anchor=\"middle\" class=\"dim\">yes\u003c/text>\n    \u003crect class=\"box\" x=\"40\" y=\"135\" width=\"160\" height=\"70\"/>\n    \u003ctext x=\"120\" y=\"165\" text-anchor=\"middle\" class=\"b\">use declared\u003c/text>\n    \u003ctext x=\"120\" y=\"187\" text-anchor=\"middle\" class=\"b\">class\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"205\" x2=\"410\" y2=\"245\" marker-end=\"url(#a4)\"/>\n    \u003ctext x=\"425\" y=\"232\" class=\"dim\">no\u003c/text>\n    \u003crect class=\"fill\" x=\"290\" y=\"245\" width=\"240\" height=\"28\"/>\n    \u003ctext x=\"305\" y=\"265\" class=\"b\">look up\u003c/text>\n    \u003ctext x=\"410\" y=\"297\" text-anchor=\"middle\">C.name + \"View\"\u003c/text>\n    \u003cline class=\"flow\" x1=\"410\" y1=\"315\" x2=\"410\" y2=\"355\" marker-end=\"url(#a4)\"/>\n    \u003crect class=\"fill\" x=\"290\" y=\"355\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"305\" y=\"375\" class=\"b\">found?\u003c/text>\n    \u003ctext x=\"305\" y=\"393\" class=\"dim\">decision\u003c/text>\n    \u003cline class=\"flow\" x1=\"530\" y1=\"390\" x2=\"620\" y2=\"390\" marker-end=\"url(#a4)\"/>\n    \u003ctext x=\"575\" y=\"382\" text-anchor=\"middle\" class=\"dim\">yes\u003c/text>\n    \u003crect class=\"box\" x=\"620\" y=\"355\" width=\"160\" height=\"70\"/>\n    \u003ctext x=\"700\" y=\"385\" text-anchor=\"middle\" class=\"b\">use that\u003c/text>\n    \u003ctext x=\"700\" y=\"407\" text-anchor=\"middle\" class=\"b\">view class\u003c/text>\n    \u003cline class=\"flow\" x1=\"290\" y1=\"390\" x2=\"200\" y2=\"390\" marker-end=\"url(#a4)\"/>\n    \u003ctext x=\"245\" y=\"382\" text-anchor=\"middle\" class=\"dim\">no\u003c/text>\n    \u003crect class=\"box\" x=\"40\" y=\"355\" width=\"160\" height=\"70\"/>\n    \u003ctext x=\"120\" y=\"385\" text-anchor=\"middle\" class=\"b\">climb to\u003c/text>\n    \u003ctext x=\"120\" y=\"407\" text-anchor=\"middle\" class=\"b\">superclass\u003c/text>\n    \u003cpath class=\"flow\" d=\"M 120 355 L 120 280 L 290 280\" marker-end=\"url(#a4)\"/>\n    \u003ctext x=\"410\" y=\"500\" text-anchor=\"middle\" class=\"dim\">Root reached without a match falls through to SvNodeView (default).\u003c/text>\n  \u003c/svg>\n"},"Persistence%20Pipeline/_index.md":{"ok":true,"status":200,"content":"# Persistence Pipeline\n\nDrilling into Local Storage. The object pool persists slot mutations through the synchronous track on the left. The blob pool stores content-addressable binaries asynchronously on the right. Garbage collection bridges them: the object pool walks reachable nodes, collects referenced hashes, and the blob pool removes any blob not in that set.\n\n\u003csvg viewBox=\"0 0 820 620\" width=\"820\" xmlns=\"http://www.w3.org/2000/svg\">\n  \u003cstyle>\n    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; fill: #111; }\n    .b { font-weight: 600; }\n    .dim { fill: #666; }\n    .box { fill: none; stroke: #111; stroke-width: 1; }\n    .fill { fill: #f0ede5; stroke: #111; stroke-width: 1; }\n    .dashed { stroke-dasharray: 4,4; fill: none; stroke: #111; stroke-width: 1; }\n    .flow { stroke: #111; stroke-width: 1; fill: none; }\n  \u003c/style>\n\u003cdefs>\n      \u003cmarker id=\"a6\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n        \u003cpath d=\"M0,0 L10,5 L0,10 z\" fill=\"#111\"/>\n      \u003c/marker>\n    \u003c/defs>\n    \u003crect class=\"box\" x=\"60\"  y=\"20\" width=\"320\" height=\"565\"/>\n    \u003ctext x=\"75\" y=\"42\" class=\"b\">Object Pool (sync)\u003c/text>\n    \u003crect class=\"box\" x=\"440\" y=\"20\" width=\"320\" height=\"565\"/>\n    \u003ctext x=\"455\" y=\"42\" class=\"b\">Blob Pool (async)\u003c/text>\n    \u003crect class=\"fill\" x=\"100\" y=\"95\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"115\" y=\"115\" class=\"b\">SvNode setter called\u003c/text>\n    \u003ctext x=\"115\" y=\"133\" class=\"dim\">slot mutation\u003c/text>\n    \u003cline class=\"flow\" x1=\"220\" y1=\"165\" x2=\"220\" y2=\"190\" marker-end=\"url(#a6)\"/>\n    \u003crect class=\"fill\" x=\"100\" y=\"190\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"115\" y=\"210\" class=\"b\">addDirtyObject(self)\u003c/text>\n    \u003ctext x=\"115\" y=\"228\" class=\"dim\">via ObjectPool\u003c/text>\n    \u003cline class=\"flow\" x1=\"220\" y1=\"260\" x2=\"220\" y2=\"285\" marker-end=\"url(#a6)\"/>\n    \u003crect class=\"fill\" x=\"100\" y=\"285\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"115\" y=\"305\" class=\"b\">end of event loop\u003c/text>\n    \u003ctext x=\"115\" y=\"323\" class=\"dim\">begin atomic txn\u003c/text>\n    \u003cline class=\"flow\" x1=\"220\" y1=\"355\" x2=\"220\" y2=\"380\" marker-end=\"url(#a6)\"/>\n    \u003crect class=\"fill\" x=\"100\" y=\"380\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"115\" y=\"400\" class=\"b\">recordForStore() per object\u003c/text>\n    \u003ctext x=\"115\" y=\"418\" class=\"dim\">write keyed by puuid\u003c/text>\n    \u003crect class=\"fill\" x=\"100\" y=\"475\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"115\" y=\"495\" class=\"b\">GC: walk reachable\u003c/text>\n    \u003ctext x=\"115\" y=\"513\" class=\"dim\">collect referenced hashes\u003c/text>\n    \u003crect class=\"fill\" x=\"480\" y=\"95\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"495\" y=\"115\" class=\"b\">asyncStoreBlob(blob)\u003c/text>\n    \u003ctext x=\"495\" y=\"133\" class=\"dim\">from app code\u003c/text>\n    \u003cline class=\"flow\" x1=\"600\" y1=\"165\" x2=\"600\" y2=\"190\" marker-end=\"url(#a6)\"/>\n    \u003crect class=\"fill\" x=\"480\" y=\"190\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"495\" y=\"210\" class=\"b\">sha256(blob) → hash\u003c/text>\n    \u003ctext x=\"495\" y=\"228\" class=\"dim\">content-addressable key\u003c/text>\n    \u003cline class=\"flow\" x1=\"600\" y1=\"260\" x2=\"600\" y2=\"285\" marker-end=\"url(#a6)\"/>\n    \u003crect class=\"fill\" x=\"480\" y=\"285\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"495\" y=\"305\" class=\"b\">write hash → data + meta\u003c/text>\n    \u003ctext x=\"495\" y=\"323\" class=\"dim\">{hash} and {hash}/meta\u003c/text>\n    \u003cline class=\"flow\" x1=\"600\" y1=\"355\" x2=\"600\" y2=\"380\" marker-end=\"url(#a6)\"/>\n    \u003crect class=\"fill\" x=\"480\" y=\"380\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"495\" y=\"400\" class=\"b\">node stores hash string\u003c/text>\n    \u003ctext x=\"495\" y=\"418\" class=\"dim\">drives GC reachability\u003c/text>\n    \u003crect class=\"fill\" x=\"480\" y=\"475\" width=\"240\" height=\"46\"/>\n    \u003ctext x=\"495\" y=\"495\" class=\"b\">remove orphan blobs\u003c/text>\n    \u003ctext x=\"495\" y=\"513\" class=\"dim\">not in referenced set\u003c/text>\n    \u003cline class=\"flow\" x1=\"340\" y1=\"510\" x2=\"480\" y2=\"510\" marker-end=\"url(#a6)\"/>\n    \u003ctext x=\"410\" y=\"503\" text-anchor=\"middle\" class=\"dim\">ref hash set\u003c/text>\n  \u003c/svg>\n"}}</script>
