<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    :root {
      --background-color: transparent;
      --text-color: #000;
      --line-color: #000;
      --nav-item-color: #000;
      --line-width: 1px;
    }
    rect {
      fill: var(--background-color);
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    line {
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    .nav-item {
      stroke: var(--nav-item-color);
      vector-effect: non-scaling-stroke;
    }
    text {
      fill: var(--text-color);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }
  </style>

  <!-- Level 1 (Vertical: Sidebar navigation | Content area) -->
  <rect x="10" y="10" width="780" height="430"/>
  <line x1="160" y1="10" x2="160" y2="440" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="20" y="20" width="130" height="30"/>
  <text x="85" y="40" text-anchor="middle">Home</text>
  <rect class="nav-item" x="20" y="60" width="130" height="30"/>
  <text x="85" y="80" text-anchor="middle">Explore</text>
  <rect class="nav-item" x="20" y="100" width="130" height="30"/>
  <text x="85" y="120" text-anchor="middle">Notifications</text>
  <rect class="nav-item" x="20" y="140" width="130" height="30"/>
  <text x="85" y="160" text-anchor="middle">Messages</text>
  <rect class="nav-item" x="20" y="180" width="130" height="30"/>
  <text x="85" y="200" text-anchor="middle">Bookmarks</text>
  <rect class="nav-item" x="20" y="220" width="130" height="30"/>
  <text x="85" y="240" text-anchor="middle">Profile</text>

  <!-- Footer separator and Compose button -->
  <line x1="10" y1="400" x2="160" y2="400"/>
  <rect class="nav-item" x="20" y="405" width="130" height="25"/>
  <text x="85" y="422" text-anchor="middle">Compose</text>

  <!-- Level 2 (Vertical: Timeline | Thread detail) -->
  <rect x="170" y="20" width="610" height="410"/>
  <line x1="420" y1="20" x2="420" y2="430" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="180" y="30" width="230" height="30"/>
  <text x="295" y="50" text-anchor="middle">Post</text>
  <rect class="nav-item" x="180" y="70" width="230" height="30"/>
  <text x="295" y="90" text-anchor="middle">Post</text>
  <rect class="nav-item" x="180" y="110" width="230" height="30"/>
  <text x="295" y="130" text-anchor="middle">Post</text>
  <rect class="nav-item" x="180" y="150" width="230" height="30"/>
  <text x="295" y="170" text-anchor="middle">Post</text>
  <rect class="nav-item" x="180" y="190" width="230" height="30"/>
  <text x="295" y="210" text-anchor="middle">Post</text>
  <rect class="nav-item" x="180" y="230" width="230" height="30"/>
  <text x="295" y="250" text-anchor="middle">Post</text>

  <!-- Thread detail view -->
  <rect class="nav-item" x="430" y="30" width="340" height="390"/>
  <text x="600" y="230" text-anchor="middle">Custom Content View</text>
</svg>
