<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    :root {
      --background-color: transparent;
      --text-color: #000;
      --line-color: #000;
      --nav-item-color: #000;
      --line-width: 1px;
    }
    rect {
      fill: var(--background-color);
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    line {
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    .nav-item {
      stroke: var(--nav-item-color);
      vector-effect: non-scaling-stroke;
    }
    text {
      fill: var(--text-color);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }
  </style>

  <!-- Level 1 (Horizontal: Top navigation row) -->
  <rect x="10" y="10" width="780" height="430"/>
  <line x1="10" y1="60" x2="790" y2="60" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="20" y="20" width="90" height="30"/>
  <text x="65" y="40" text-anchor="middle">Facebook</text>
  <rect class="nav-item" x="120" y="20" width="80" height="30"/>
  <text x="160" y="40" text-anchor="middle">Home</text>
  <rect class="nav-item" x="210" y="20" width="80" height="30"/>
  <text x="250" y="40" text-anchor="middle">Reels</text>
  <rect class="nav-item" x="300" y="20" width="120" height="30"/>
  <text x="360" y="40" text-anchor="middle">Marketplace</text>
  <rect class="nav-item" x="430" y="20" width="80" height="30"/>
  <text x="470" y="40" text-anchor="middle">Groups</text>
  <rect class="nav-item" x="520" y="20" width="80" height="30"/>
  <text x="560" y="40" text-anchor="middle">Gaming</text>

  <!-- Level 2 (Vertical: Sidebar | Content area) -->
  <rect x="20" y="70" width="760" height="360"/>
  <line x1="170" y1="70" x2="170" y2="430" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="30" y="80" width="130" height="30"/>
  <text x="95" y="100" text-anchor="middle">User</text>
  <rect class="nav-item" x="30" y="115" width="130" height="30"/>
  <text x="95" y="135" text-anchor="middle">Meta AI</text>
  <rect class="nav-item" x="30" y="150" width="130" height="30"/>
  <text x="95" y="170" text-anchor="middle">Friends</text>
  <rect class="nav-item" x="30" y="185" width="130" height="30"/>
  <text x="95" y="205" text-anchor="middle">Memories</text>
  <rect class="nav-item" x="30" y="220" width="130" height="30"/>
  <text x="95" y="240" text-anchor="middle">Saved</text>
  <rect class="nav-item" x="30" y="255" width="130" height="30"/>
  <text x="95" y="275" text-anchor="middle">Groups</text>
  <rect class="nav-item" x="30" y="290" width="130" height="30"/>
  <text x="95" y="310" text-anchor="middle">Reels</text>
  <rect class="nav-item" x="30" y="325" width="130" height="30"/>
  <text x="95" y="345" text-anchor="middle">Marketplace</text>
  <rect class="nav-item" x="30" y="360" width="130" height="30"/>
  <text x="95" y="380" text-anchor="middle">Feeds</text>

  <!-- Level 3 (Vertical: Post feed | Post detail) -->
  <rect x="180" y="80" width="590" height="340"/>
  <line x1="420" y1="80" x2="420" y2="420" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="190" y="90" width="220" height="30"/>
  <text x="300" y="110" text-anchor="middle">Post</text>
  <rect class="nav-item" x="190" y="130" width="220" height="30"/>
  <text x="300" y="150" text-anchor="middle">Post</text>
  <rect class="nav-item" x="190" y="170" width="220" height="30"/>
  <text x="300" y="190" text-anchor="middle">Post</text>
  <rect class="nav-item" x="190" y="210" width="220" height="30"/>
  <text x="300" y="230" text-anchor="middle">Post</text>
  <rect class="nav-item" x="190" y="250" width="220" height="30"/>
  <text x="300" y="270" text-anchor="middle">Post</text>
  <rect class="nav-item" x="190" y="290" width="220" height="30"/>
  <text x="300" y="310" text-anchor="middle">Post</text>

  <!-- Post detail view -->
  <rect class="nav-item" x="430" y="90" width="340" height="320"/>
  <text x="600" y="246" text-anchor="middle">Custom Content View<tspan x="600" dy="18">(collapses posts view)</tspan></text>
</svg>
