<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    :root {
      --background-color: transparent;
      --text-color: #000;
      --line-color: #000;
      --nav-item-color: #000;
      --line-width: 1px;
    }
    rect {
      fill: var(--background-color);
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    line {
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    .nav-item {
      stroke: var(--nav-item-color);
      vector-effect: non-scaling-stroke;
    }
    text {
      fill: var(--text-color);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }
  </style>

  <!-- Level 1 (Horizontal menu) -->
  <rect x="10" y="10" width="780" height="430"/>
  <line x1="10" y1="60" x2="790" y2="60" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="20" y="20" width="80" height="30"/>
  <text x="60" y="40" text-anchor="middle">Gmail</text>
  <rect class="nav-item" x="110" y="20" width="80" height="30"/>
  <text x="150" y="40" text-anchor="middle">Search</text>
  <rect class="nav-item" x="200" y="20" width="80" height="30"/>
  <text x="240" y="40" text-anchor="middle">Help</text>
  <rect class="nav-item" x="290" y="20" width="80" height="30"/>
  <text x="330" y="40" text-anchor="middle">Settings</text>

  <!-- Level 2 (Vertical: Folders sidebar | Message area) -->
  <rect x="20" y="70" width="760" height="360"/>
  <line x1="170" y1="70" x2="170" y2="430" stroke-dasharray="5,5"/>

  <!-- Header: Compose button and separator -->
  <rect class="nav-item" x="30" y="80" width="130" height="25"/>
  <text x="95" y="97" text-anchor="middle">Compose</text>
  <line x1="20" y1="115" x2="170" y2="115"/>

  <rect class="nav-item" x="30" y="125" width="130" height="30"/>
  <text x="95" y="145" text-anchor="middle">Inbox</text>
  <rect class="nav-item" x="30" y="165" width="130" height="30"/>
  <text x="95" y="185" text-anchor="middle">Starred</text>
  <rect class="nav-item" x="30" y="205" width="130" height="30"/>
  <text x="95" y="225" text-anchor="middle">Sent</text>
  <rect class="nav-item" x="30" y="245" width="130" height="30"/>
  <text x="95" y="265" text-anchor="middle">Drafts</text>
  <rect class="nav-item" x="30" y="285" width="130" height="30"/>
  <text x="95" y="305" text-anchor="middle">Trash</text>

  <!-- Level 3 (Vertical: Message list | Message content) -->
  <rect x="180" y="80" width="590" height="340"/>
  <line x1="380" y1="80" x2="380" y2="420" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="190" y="90" width="180" height="30"/>
  <text x="280" y="110" text-anchor="middle">Message</text>
  <rect class="nav-item" x="190" y="130" width="180" height="30"/>
  <text x="280" y="150" text-anchor="middle">Message</text>
  <rect class="nav-item" x="190" y="170" width="180" height="30"/>
  <text x="280" y="190" text-anchor="middle">Message</text>
  <rect class="nav-item" x="190" y="210" width="180" height="30"/>
  <text x="280" y="230" text-anchor="middle">Message</text>
  <rect class="nav-item" x="190" y="250" width="180" height="30"/>
  <text x="280" y="270" text-anchor="middle">Message</text>

  <!-- Message content view -->
  <rect class="nav-item" x="390" y="90" width="370" height="320"/>
  <text x="575" y="255" text-anchor="middle">Custom Content View</text>
</svg>
