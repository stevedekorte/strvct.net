<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    :root {
      --background-color: transparent;
      --text-color: #000;
      --line-color: #000;
      --nav-item-color: #000;
      --line-width: 1px;
    }
    rect {
      fill: var(--background-color);
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    line {
      stroke: var(--line-color);
      stroke-width: var(--line-width);
      vector-effect: non-scaling-stroke;
    }
    .nav-item {
      stroke: var(--nav-item-color);
      vector-effect: non-scaling-stroke;
    }
    text {
      fill: var(--text-color);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }
  </style>

  <!-- Level 1 (Horizontal: Department navigation) -->
  <rect x="10" y="10" width="780" height="430"/>
  <line x1="10" y1="60" x2="790" y2="60" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="20" y="20" width="80" height="30"/>
  <text x="60" y="40" text-anchor="middle">Amazon</text>
  <rect class="nav-item" x="110" y="20" width="80" height="30"/>
  <text x="150" y="40" text-anchor="middle">Account</text>
  <rect class="nav-item" x="200" y="20" width="140" height="30"/>
  <text x="270" y="40" text-anchor="middle">Orders &amp; Returns</text>
  <rect class="nav-item" x="350" y="20" width="80" height="30"/>
  <text x="390" y="40" text-anchor="middle">Cart</text>

  <!-- Level 2 (Horizontal: Category row, then Results area below) -->
  <rect x="20" y="70" width="760" height="360"/>
  <line x1="20" y1="120" x2="780" y2="120" stroke-dasharray="5,5"/>
  <rect class="nav-item" x="30" y="80" width="100" height="30"/>
  <text x="80" y="100" text-anchor="middle">Laptops</text>
  <rect class="nav-item" x="140" y="80" width="100" height="30"/>
  <text x="190" y="100" text-anchor="middle">Phones</text>
  <rect class="nav-item" x="250" y="80" width="100" height="30"/>
  <text x="300" y="100" text-anchor="middle">Tablets</text>
  <rect class="nav-item" x="360" y="80" width="100" height="30"/>
  <text x="410" y="100" text-anchor="middle">Audio</text>
  <rect class="nav-item" x="470" y="80" width="100" height="30"/>
  <text x="520" y="100" text-anchor="middle">Cameras</text>

  <!-- Level 3 (Grid: Product grid | Product detail) -->
  <rect x="30" y="130" width="740" height="290"/>
  <line x1="560" y1="130" x2="560" y2="420" stroke-dasharray="5,5"/>

  <!-- Product grid (3x2) -->
  <rect class="nav-item" x="40" y="140" width="160" height="130"/>
  <text x="120" y="210" text-anchor="middle">Product</text>
  <rect class="nav-item" x="210" y="140" width="160" height="130"/>
  <text x="290" y="210" text-anchor="middle">Product</text>
  <rect class="nav-item" x="380" y="140" width="160" height="130"/>
  <text x="460" y="210" text-anchor="middle">Product</text>

  <rect class="nav-item" x="40" y="280" width="160" height="130"/>
  <text x="120" y="350" text-anchor="middle">Product</text>
  <rect class="nav-item" x="210" y="280" width="160" height="130"/>
  <text x="290" y="350" text-anchor="middle">Product</text>
  <rect class="nav-item" x="380" y="280" width="160" height="130"/>
  <text x="460" y="350" text-anchor="middle">Product</text>

  <!-- Product detail view -->
  <rect class="nav-item" x="570" y="140" width="200" height="270"/>
  <text x="670" y="271" text-anchor="middle">Custom Content View<tspan x="670" dy="18">(collapses product grid)</tspan></text>
</svg>
